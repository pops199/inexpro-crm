services:
  app:
    # ── Build directly from the GitHub repo ────────────────────────────
    # No local clone required on the server. Compose fetches the named
    # ref into a temporary build context and runs the Dockerfile.
    #
    # `#main` pins to the main branch; change to `#v1.0.1` (or any tag)
    # to deploy a specific release. The repo is public so no auth is
    # needed.
    #
    # To pull a newer commit / release, run:
    #   docker compose build --no-cache app && docker compose up -d
    build:
      context: https://github.com/pops199/inexpro-crm.git#main
      args:
        # BuildKit drops the .git directory from a remote-Git context by
        # default. The in-app updater (Admin → Settings → System Update)
        # needs .git inside the runtime image so it can `git fetch` /
        # `git checkout` against tagged releases. This flag tells BuildKit
        # to keep .git in the build context so the Dockerfile's `COPY .git/`
        # actually finds something.
        BUILDKIT_CONTEXT_KEEP_GIT_DIR: "1"
    image: inexpro-crm:latest
    container_name: inexpro-crm
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Persistent data — DB, uploads, reports live on the host under
      # /crm-data and are bind-mounted here so the same layout is
      # visible inside the container. Tree (host == container):
      #   /crm-data/server/db/inexpro.db   ← SQLite DB + WAL
      #   /crm-data/client/uploads         ← user-uploaded documents
      #   /crm-data/client/reports         ← generated PDFs / CSVs
      - /crm-data:/crm-data
      # Optional: host-side signatures folder. Drop PNG/JPG files here
      # to make them selectable as per-user email signatures without
      # rebuilding. Comment out if you don't need it; the image ships
      # with a (possibly empty) /app/signatures already.
      # - /opt/inexpro-signatures:/app/signatures
    environment:
      - NODE_ENV=production
      - TZ=Africa/Johannesburg
      - PORT=3000
      - SESSION_SECRET=${SESSION_SECRET:-change-this-to-a-long-random-string}
      - DOCUMENT_ENCRYPTION_KEY=${DOCUMENT_ENCRYPTION_KEY:-change-this-to-a-separate-long-random-string}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DB_PATH=/crm-data/server/db/inexpro.db
      - UPLOAD_PATH=/crm-data/client/uploads
      - REPORTS_PATH=/crm-data/client/reports
      # Set to "true" only if you have HTTPS via Nginx
      - COOKIE_SECURE=false

  # Optional: Nginx reverse proxy for HTTPS
  # 1. Place SSL certs in ./certs/ (fullchain.pem + privkey.pem)
  # 2. Edit nginx.conf — change "your-domain.com"
  # 3. Uncomment below and set COOKIE_SECURE=true above
  # nginx:
  #   image: nginx:alpine
  #   container_name: inexpro-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #     - ./certs:/etc/nginx/certs:ro
  #   depends_on:
  #     - app
